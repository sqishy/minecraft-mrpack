<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rideable Pok&eacute;mon &mdash; Cobblemon Rally</title>
<style>
:root{
  --bg:#0f1420; --panel:#171d2b; --panel2:#1e2637; --line:#2a3348;
  --text:#e8edf6; --muted:#93a0b8; --accent:#4dd0a7; --accent2:#5aa9ff;
  --air:#7fb2ff; --land:#c7a56a; --water:#4fc3e8; --liquid:#4fc3e8; --lava:#ff8a5c;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);
  font:15px/1.45 system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
header{padding:22px 20px 10px;max-width:1200px;margin:0 auto}
h1{margin:0 0 4px;font-size:26px;letter-spacing:.2px}
.sub{color:var(--muted);font-size:14px}
.sub a{color:var(--accent2);text-decoration:none}
.wrap{max-width:1200px;margin:0 auto;padding:0 20px 60px}
.controls{position:sticky;top:0;z-index:5;background:linear-gradient(var(--bg),var(--bg) 70%,transparent);
  padding:14px 0 12px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
input[type=search]{flex:1 1 260px;min-width:220px;background:var(--panel);border:1px solid var(--line);
  color:var(--text);border-radius:9px;padding:10px 12px;font-size:15px;outline:none}
input[type=search]:focus{border-color:var(--accent)}
select{background:var(--panel);border:1px solid var(--line);color:var(--text);
  border-radius:9px;padding:9px 10px;font-size:14px}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{cursor:pointer;user-select:none;border:1px solid var(--line);background:var(--panel);
  color:var(--muted);border-radius:999px;padding:6px 12px;font-size:13px;transition:.12s}
.chip.on{color:#08130f;background:var(--accent);border-color:var(--accent);font-weight:600}
.chip.terr.on{background:var(--accent2);border-color:var(--accent2);color:#04121f}
.count{color:var(--muted);font-size:13px;margin-left:auto}
.tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
table{border-collapse:collapse;width:100%;min-width:900px}
th,td{padding:9px 12px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
th{position:sticky;top:70px;background:var(--panel2);color:var(--muted);font-weight:600;
  font-size:12px;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;user-select:none}
th.sorted::after{content:" \25B4";color:var(--accent)}
th.sorted.desc::after{content:" \25BE"}
tbody tr:hover{background:#131a28}
td.dex{color:var(--muted);font-variant-numeric:tabular-nums}
.spr{width:44px;height:44px;image-rendering:pixelated;vertical-align:middle;background:#0b0f18;border-radius:8px}
.nm{font-weight:600}
.src{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;
  background:var(--panel2);border:1px solid var(--line);color:var(--muted);margin-right:4px}
.src.mega{color:#ffd27f;border-color:#5a4a24}
.src.zamega{color:#c69bff;border-color:#4a3a66}
.src.rally{color:#7fe6c2;border-color:#245a49}
.src.gemcraft{color:#8fd0ff;border-color:#24455a}
.terr{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;margin-right:4px;color:#06111c}
.terr.AIR{background:var(--air)} .terr.LAND{background:var(--land)}
.terr.WATER,.terr.LIQUID{background:var(--water)} .terr.LAVA{background:var(--lava)}
.statcell{min-width:74px}
.bar{position:relative;height:16px;border-radius:4px;background:#0b0f18;overflow:hidden}
.bar>i{position:absolute;top:0;bottom:0;background:linear-gradient(90deg,#2f6f5b,#4dd0a7);opacity:.85}
.bar>span{position:relative;font-size:11px;padding:0 5px;line-height:16px;color:#eafff6;
  text-shadow:0 1px 1px #000;font-variant-numeric:tabular-nums}
.na{color:#4a566e}
.foot{color:var(--muted);font-size:12px;margin-top:14px}
.multi{display:flex;gap:6px;flex-wrap:wrap}
@media(max-width:640px){th{top:120px}}
</style>
</head>
<body>
<header>
  <h1>Rideable Pok&eacute;mon</h1>
  <div class="sub">Every mount across base Cobblemon <b>and every installed addon</b>
    (Mega Showdown, ZAMega, &hellip;) plus our Rally mounts &mdash; the addon rows are
    the ones <a href="https://www.cobbledex.info/rideable-mons" target="_blank" rel="noopener">cobbledex</a> is missing.</div>
</header>
<div class="wrap">
  <div class="controls">

    <label class="chip terr" id="addonsOnly">Addon mounts only</label>
    <span class="count" id="count"></span>

        <th data-k="SKILL" class="statcell">Skill</th>
        <th data-k="STAMINA" class="statcell">Stamina</th>
        <th data-k="seats">Seats</th>
      </tr></thead>
      <tbody id="tb"></tbody>
    </table>
  </div>
  <div class="foot" id="foot"></div>
</div>

const STATS = ["SPEED","ACCELERATION","JUMP","SKILL","STAMINA"];
// Rough display ceiling for the stat bars (Cobblemon ride stats mostly 0-150).
const STAT_MAX = 150;
const state = {q:"", terr:new Set(), src:new Set(), addonsOnly:false, sort:"dex", desc:false};

function srcClass(s){
  const m={"Mega Showdown":"mega","ZAMega":"zamega","Rally":"rally","GemCraft":"gemcraft"};
  return m[s]||"";
}
function isAddonRow(r){ return r.sources.some(s=>s!=="Cobblemon"); }

// Merge a row's per-terrain stats into a single min/max for display when a stat
// exists in any active (or all) terrain. We show the value from the first terrain
// that has it, preferring the currently-filtered terrains.
function statFor(r, key){
  const terrs = Object.keys(r.behaviours).filter(t=> state.terr.size? state.terr.has(t): true);
  const list = terrs.length? terrs : Object.keys(r.behaviours);
  for(const t of list){ const v=r.behaviours[t].stats[key]; if(v) return v; }
  return null;
}
function statNum(v){ if(!v) return -1; const m=String(v).match(/\d+/g); if(!m) return -1;
  return m.map(Number).reduce((a,b)=>a+b,0)/m.length; }

function chip(text,on,cls){const e=document.createElement("label");
  e.className="chip"+(cls?(" "+cls):"")+(on?" on":"");e.textContent=text;return e;}

function buildFilters(){
  const tw=document.getElementById("terrains");
  DB.terrains.forEach(t=>{const c=chip(t,false,"terr");c.onclick=()=>{
    state.terr.has(t)?state.terr.delete(t):state.terr.add(t);c.classList.toggle("on");render();};
    tw.appendChild(c);});
  const sw=document.getElementById("sources");
  DB.sources.forEach(s=>{const c=chip(s,false,srcClass(s));c.onclick=()=>{
    state.src.has(s)?state.src.delete(s):state.src.add(s);c.classList.toggle("on");render();};
    sw.appendChild(c);});
  const ao=document.getElementById("addonsOnly");
  ao.onclick=()=>{state.addonsOnly=!state.addonsOnly;ao.classList.toggle("on");render();};
}

function match(r){
  if(state.q){ if(!r.name.toLowerCase().includes(state.q)) return false; }
  if(state.addonsOnly && !isAddonRow(r)) return false;
  if(state.terr.size && !r.terrains.some(t=>state.terr.has(t))) return false;
  if(state.src.size && !r.sources.some(s=>state.src.has(s))) return false;
  return true;
}
function sortRows(rows){
  const k=state.sort, d=state.desc?-1:1;
  const val=r=>{
    if(k==="dex") return r.dex==null?1e9:r.dex;
    if(k==="name") return r.name.toLowerCase();
    if(k==="src") return r.sources.join(",");
    if(k==="terr") return r.terrains.join(",");
    if(k==="seats") return r.seats;
    if(STATS.includes(k)) return statNum(statFor(r,k));
    return 0;
  };
  return rows.sort((a,b)=>{const x=val(a),y=val(b);return x<y?-1*d:x>y?1*d:0;});
}

function bar(v){
  if(!v) return '<span class="na">&mdash;</span>';
  const nums=String(v).match(/\d+/g).map(Number);
  const hi=Math.max(...nums), pct=Math.min(100,Math.round(hi/STAT_MAX*100));
  const label = nums.length>1 ? nums[0]+"–"+nums[nums.length-1] : String(nums[0]);
  return '<div class="bar"><i style="width:'+pct+'%"></i><span>'+label+'</span></div>';
}
function spriteUrl(r){ return r.dex? ("https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/"+r.dex+".png") : ""; }

function render(){
  const tb=document.getElementById("tb");
  let rows=DB.rows.filter(match);
  sortRows(rows);
  tb.innerHTML="";
  const frag=document.createDocumentFragment();
  rows.forEach(r=>{
    const tr=document.createElement("tr");
    const src=r.sources.map(s=>'<span class="src '+srcClass(s)+'">'+s+'</span>').join("");
    const terr=r.terrains.map(t=>'<span class="terr '+t+'">'+t+'</span>').join("");
    const spr=spriteUrl(r);
    tr.innerHTML =
      '<td class="dex">'+(r.dex??"")+'</td>'+
      '<td>'+(spr?'<img class="spr" loading="lazy" src="'+spr+'" onerror="this.style.visibility=\'hidden\'">':'')+'</td>'+
      '<td class="nm">'+r.name+'</td>'+
      '<td>'+src+'</td>'+
      '<td>'+terr+'</td>'+
      STATS.map(k=>'<td class="statcell">'+bar(statFor(r,k))+'</td>').join("")+
      '<td>'+(r.seats||"")+'</td>';
    frag.appendChild(tr);
  });
  tb.appendChild(frag);
  document.getElementById("count").textContent = rows.length+" / "+DB.rows.length+" mounts";
}

document.getElementById("q").addEventListener("input",e=>{state.q=e.target.value.trim().toLowerCase();render();});
document.querySelectorAll("th[data-k]").forEach(th=>{
  th.onclick=()=>{const k=th.dataset.k;
    if(state.sort===k) state.desc=!state.desc; else {state.sort=k;state.desc=(k!=="dex"&&k!=="name");}
    document.querySelectorAll("th").forEach(x=>x.classList.remove("sorted","desc"));
    th.classList.add("sorted"); if(state.desc) th.classList.add("desc"); render();};
});
document.getElementById("foot").textContent =
  DB.rows.length+" rideable species/forms indexed · sources: "+DB.sources.join(", ");
buildFilters(); render();
</script>
