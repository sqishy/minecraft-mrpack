#Enable FOV scaling based on mount velocity
enableFovScaling = true
#Maximum FOV increase in degrees at top speed
# Default: 12.0
# Range: 0.0 ~ 45.0
fovMaxDelta = 12.0
#Speed ratio below which FOV stays unchanged (0.15 = below 15% of max speed)
# Default: 0.15
# Range: 0.0 ~ 0.5
fovDeadZone = 0.15
#Lerp factor per tick (lower = smoother/slower, higher = snappier). 0.10 ≈ half-second settle.
# Default: 0.1
# Range: 0.01 ~ 1.0
fovSmoothing = 0.1
#Extra FOV degrees added during boost
# Default: 5.0
# Range: 0.0 ~ 20.0
fovBoostExtra = 5.0
#Reference max speed in blocks/tick for FOV scaling. Tune to your mount speeds.
# Default: 0.45
# Range: 0.1 ~ 2.0
fovMaxSpeedRef = 0.45
#Enable speed particles behind mount
enableParticles = true
#Particle density multiplier
# Default: 1.0
# Range: 0.0 ~ 3.0
particleDensity = 1.0
#Enable racing sound effects
enableRaceSounds = true
#Show speed indicator on HUD during races
enableSpeedIndicator = true
#Steering mode: CAMERA = mouse look steers (default), WASD = A/D keys steer
#Allowed Values: CAMERA, WASD
steeringMode = "CAMERA"
#Deceleration multiplier when pressing S in WASD mode (higher = stronger brakes)
# Default: 2.5
# Range: 1.0 ~ 10.0
brakeDecelMultiplier = 2.5
#Camera snap-back lerp rate per tick after freelook stops (lower = slower)
# Default: 0.12
# Range: 0.01 ~ 1.0
cameraSnapBackSpeed = 0.12
#Idle ticks after mouse stops before camera snaps back to mount heading
# Default: 10
# Range: 0 ~ 60
cameraFreelookDecayTicks = 10
#Speed display unit: MPH = miles per hour, KMH = kilometers per hour, BPM = blocks per minute
#Allowed Values: MPH, KMH, BPM
speedUnit = "MPH"
#Dead zone for controller analog sticks (0.0-0.5). Inputs below this threshold are ignored.
# Default: 0.15
# Range: 0.0 ~ 0.5
controllerDeadZone = 0.15
#Sensitivity multiplier for controller analog steering. 1.0 = normal.
# Default: 1.0
# Range: 0.1 ~ 3.0
controllerSensitivity = 1.0
#Dead zone for trigger axes (drift/accelerate). Triggers often need lower dead zones than sticks.
# Default: 0.05
# Range: 0.0 ~ 0.3
controllerTriggerDeadZone = 0.05
#Rumble intensity multiplier (0.0 = off, 1.0 = full). Scales all haptic feedback effects.
# Default: 1.0
# Range: 0.0 ~ 1.0
controllerRumbleIntensity = 1.0
